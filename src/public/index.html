<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuardianApp — Seguridad con 2FA</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Poppins font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- App styles -->
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<!-- ─── Toast Container ──────────────────────────────── -->
<div id="toast-container" class="toast-container"></div>

<!-- ══════════════════════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="shield-icon">🔐</span>
      <h1>GuardianApp</h1>
      <p>Sistema de Seguridad de la Información · JWT + 2FA</p>
    </div>
    <div id="auth-form-container"></div>

    <!-- Demo credentials -->
    <div class="mt-4 p-3" style="background:#f8fafc;border-radius:10px;border:1px solid var(--border)">
      <p class="mb-2" style="font-size:0.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em">
        Credenciales de demo
      </p>
      <div style="font-size:0.78rem;font-family:monospace">
        <div onclick="fillDemo('admin@guardianapp.com','Admin123!')"
             style="cursor:pointer;padding:3px 6px;border-radius:6px;transition:background .1s"
             onmouseover="this.style.background='#e0e7ff'" onmouseout="this.style.background='transparent'">
          <span style="color:#e11d48;font-weight:700">ADMIN</span>
          <span style="color:var(--text-muted)"> admin@guardianapp.com / Admin123!</span>
        </div>
        <div onclick="fillDemo('editor@guardianapp.com','Editor123!')"
             style="cursor:pointer;padding:3px 6px;border-radius:6px;transition:background .1s"
             onmouseover="this.style.background='#fef9c3'" onmouseout="this.style.background='transparent'">
          <span style="color:#d97706;font-weight:700">EDITOR</span>
          <span style="color:var(--text-muted)"> editor@guardianapp.com / Editor123!</span>
        </div>
        <div onclick="fillDemo('viewer@guardianapp.com','Viewer123!')"
             style="cursor:pointer;padding:3px 6px;border-radius:6px;transition:background .1s"
             onmouseover="this.style.background='#ccfbf1'" onmouseout="this.style.background='transparent'">
          <span style="color:#0d9488;font-weight:700">VIEWER</span>
          <span style="color:var(--text-muted)"> viewer@guardianapp.com / Viewer123!</span>
        </div>
      </div>
    </div>

    <!-- Security badges -->
    <div class="d-flex gap-2 justify-content-center mt-3 flex-wrap">
      <span style="font-size:0.68rem;background:#e0e7ff;color:#4338ca;padding:3px 10px;border-radius:20px;font-weight:600">🔑 JWT</span>
      <span style="font-size:0.68rem;background:#ccfbf1;color:#0d9488;padding:3px 10px;border-radius:20px;font-weight:600">🔐 2FA TOTP</span>
      <span style="font-size:0.68rem;background:#fef9c3;color:#b45309;padding:3px 10px;border-radius:20px;font-weight:600">🛡️ bcrypt</span>
      <span style="font-size:0.68fn;background:#fce7f3;color:#be185d;padding:3px 10px;border-radius:20px;font-weight:600">⚡ Rate limit</span>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     APP SCREEN
══════════════════════════════════════════════════════ -->
<div id="app-screen" class="d-none">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="btn d-md-none" style="background:none;border:none;color:var(--text-muted);font-size:1.25rem"
                onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h2 id="page-title">Dashboard</h2>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span style="font-size:0.72rem;background:#e0e7ff;color:#4338ca;padding:2px 10px;border-radius:20px;font-weight:600">JWT</span>
        <span id="twofa-topbar-badge"></span>
      </div>
    </header>

    <main class="page-content" id="page-content"></main>
  </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- App JS -->
<script src="/js/utils.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/pages/records.js"></script>
<script src="/js/pages/users.js"></script>
<script src="/js/pages/audit.js"></script>
<script src="/js/pages/assets-risks.js"></script>
<script src="/js/pages/security.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    checkSession();
    renderAuthForm('login');
  });

  function fillDemo(email, pass) {
    renderAuthForm('login');
    setTimeout(() => {
      const eEl = document.getElementById('login-email');
      const pEl = document.getElementById('login-password');
      if (eEl) eEl.value = email;
      if (pEl) pEl.value = pass;
    }, 50);
  }

  document.addEventListener('click', e => {
    const sidebar = document.getElementById('sidebar');
    if (sidebar && !sidebar.contains(e.target) && !e.target.closest('.topbar')) {
      sidebar.classList.remove('open');
    }
  });
</script>
</body>
</html>
